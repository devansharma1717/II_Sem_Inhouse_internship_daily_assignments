<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Admission Form</title>
<link rel="stylesheet" href="style2.css">
</head>
<body>

<div class="container">

<h1>College Admission Form</h1>
<p>Please fill in the form carefully.</p>

<form>

<fieldset>

<legend>Personal Information</legend>

<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>Father's Name</label>
<input type="text" placeholder="Enter father's name" required>

<label>Mother's Name</label>
<input type="text" placeholder="Enter mother's name" required>

<label>Date of Birth</label>
<input type="date" required>

<label>Gender</label>

<div class="radio-group">
<label><input type="radio" name="gender" required> Male</label>
<label><input type="radio" name="gender"> Female</label>
<label><input type="radio" name="gender"> Other</label>
</div>

</fieldset>

<fieldset>

<legend>Contact Details</legend>

<label>Email Address</label>
<input type="email" placeholder="example@gmail.com" required>

<label>Mobile Number</label>
<input type="tel" placeholder="10-digit Mobile Number" pattern="[0-9]{10}" required>

<label>Address</label>
<textarea rows="4" placeholder="Enter your address" required></textarea>

<label>City</label>
<input type="text" placeholder="Enter city" required>

<label>State</label>
<input type="text" placeholder="Enter state" required>

<label>PIN Code</label>
<input type="text" placeholder="6-digit PIN Code" pattern="[0-9]{6}" required>

</fieldset>

<fieldset>

<legend>Academic Details</legend>

<label>Board</label>

<select required>
<option value="">Select Board</option>
<option>CBSE</option>
<option>ICSE</option>
<option>State Board</option>
</select>

<label>12th Percentage</label>
<input type="number" placeholder="Enter Percentage" min="0" max="100" required>

<label>Course Applying For</label>

<select required>
<option value="">Select Course</option>
<option>B.Tech</option>
<option>BCA</option>
<option>BBA</option>
<option>B.Sc</option>
<option>BA</option>
<option>B.Com</option>
</select>

</fieldset>

<fieldset>

<legend>Upload Documents</legend>

<label>Passport Size Photo</label>
<input type="file" required>

<label>Class 12 Marksheet</label>
<input type="file" required>

</fieldset>

<label class="checkbox">
<input type="checkbox" required>
I hereby declare that the above information is true to the best of my knowledge.
</label>

<div class="buttons">
<button type="submit" class="submit">Submit Application</button>
<button type="reset" class="reset">Reset Form</button>
</div>

</form>

</div>

</body>
</html>
