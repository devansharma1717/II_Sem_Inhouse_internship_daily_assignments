<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style4.css">
</head>
<body>
    <center>
    <button onclick="toggleMode()">🌙 Dark Mode</button>
    <p id="modeText">Current Mode : Light Mode ☀️</p>
</center>
    <div>
        <center><h1><u>College Admission Form</u></h1></center>
    </div>
    <div>
        <center><h2>Please fill in the form carefully</h2></center>
    </div>
    <section>
        <form onsubmit="return validateForm()">
            <fieldset>
                <legend><h3>Personl Information</h3></legend>
                <div>
                    <label for="full name"><b>Full Name</b></label>
                    <br>
                    <input type="text" id="full name" name="full name" placeholder="Enter your full name" required minlength="3">
                </div>
                <br>
                <div>
                    <label for="father's name"><b>Father's Name</b></label>
                    <br>
                    <input type="text" id="father's name" name="father's name" placeholder="Enter your father's name" required minlength="3">
                </div>
                <br>
                <div>
                    <label for="mother's name"><b>Mother's Name</b></label>
                    <br>
                    <input type="text" id="mother's name" name="mother's name" placeholder="Enter your mother's name" required minlength="3">
                </div>
                <br>
                <div>
                    <label for="dob"><b>Date of Birth</b></label>
                    <br>
                    <input type="date" name="dob" id="dob" required>
                </div>
                <br>
                <div>
                    <label for="gender"><b>Gender</b></label>
                    <br>
                    <input type="radio" id="male" name="gender">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender">
                    <label for="female">Female</label>
                    <input type="radio" id="other" name="gender">
                    <label for="other">Other</label>
                </div>
            </fieldset>
            <fieldset>
                <legend><h3>Contact Details</h3></legend>
                <div>
                    <label for="email address"><b>Email Address</b></label>
                    <br>
                    <input type="email" id="email address" name="email address" placeholder="example@gmail.com" required>
                </div>
                <br>
                <div>
                    <label for="mobile number"><b>Mobile Number</b></label>
                    <br>
                    <input type="tel" name="mobile number" id="mobile number" placeholder="10-digit Mobile Number" pattern="[0-9]{10}required" required>
                </div>
                <br>
                <div>
                    <label for="address"><b>Address</b></label>
                    <br>
                    <textarea name="address" id="address" rows="5" cols="120" placeholder="Enter your Address"></textarea>
                </div>
                <br>
                <div>
                    <label for="city"><b>City</b></label>
                    <br>
                    <input type="text" name="city" placeholder="Enter City">
                </div>
                <br>
                <div>
                    <label for="state"><b>State</b></label>
                    <br>
                    <input type="text" name="state" placeholder="Enter State">
                </div>
                <br>
                <div>
                    <label for="pincode"><b>PIN Code</b></label>
                    <br>
                    <input type="text" name="pincode" placeholder="6-digit PIN code" pattern="[0-9]{10} required">
                </div>
            </fieldset>
                <fieldset>
                    <legend><h3>Academic Details</h3></legend>
                    <div>
                        <label for="board"><b>Board</b></label>
                        <br>
                        <select name="board" id="board" required>
                            <option value=""selected disabled>Choose Board</option>
                            <option value="CBSE">CBSE</option>
                            <option value="RBSE">RBSE</option>
                            <option value="ICSE">ICSE</option>
                        
                        </select>
                        
                    </div>
                    <br>
                    <div>
                        <label for="percentage"><b>12<sup>th</sup>Percentage</b></label>
                        <br>
                        <input type="percentage" name="percentage" min="o" max="100" step="0.01" placeholder="Enter Percentage" required>
                    </div>
                    <br>
                    <div>
                        <label for="course">Course Applying For</label>
                        <select name="coursee" id="course" required>
                            <option value=""selected disabled>Choose course</option>
                            <option value="B.Tech">B.Tech</option>
                            <option value="M.Tech">M.Tech</option>
                            <option value="BBA">BBA</option>
                            <option value="MBA">MBA</option>
                            <option value="BCA">BCA</option>
                            <option value="MCA">MCA</option>
                        

                        </select>
                    </div>
                </fieldset>
                    <fieldset>
                        <legend><h3>Upload Documents</h3></legend>
                        <div>
                            <label for="photo"><b>Passport size Photo</b></label>
                            <br>
                            <input type="file" name="photo" id="photo" required >
                        </div>
                        <br>
                        <div>
                            <label for=" marksheet photo"><b>Class 12 Marksheet</b></label>
                            <br>
                            <input type="file" name=" marksheet photo" id=" marksheet photo" >
                        </div>
                     </fieldset>
                     <br>
                     <div>
                     <input type="checkbox" name="checkbox" id="checkbox" required>
                     <label for="checkbox"><b>i hereby declare that the above information is true to the best of my knowledge</b></label>
                     </div>
                     <br>
                     <div>
                        <input type="submit" value="Submit Application">
                        <input type="reset" value="Rest Form">
                     </div>
                     </form>
    </section>
    
<script src="script4.js"></script>

</body>
</html>
